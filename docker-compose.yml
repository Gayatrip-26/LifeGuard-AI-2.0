services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeguard_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
      - ingestion_service
    environment:
      # Empty client URLs → browser calls same-origin; Vite proxies to Docker services.
      - VITE_API_URL=
      - VITE_INGESTION_URL=
      - VITE_PREDICTION_URL=
      - VITE_AI_ENABLED=true
      - VITE_PROXY_BACKEND=http://backend:8000
      - VITE_PROXY_INGESTION=http://ingestion_service:8101
      - VITE_PROXY_PREDICTION=http://prediction_service:8102
    command: npm run dev -- --host 0.0.0.0 --port 5173

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeguard_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - APP_NAME=LifeGuard AI 2.0 Backend
      - APP_ENV=development
      - APP_PORT=8000
      - AI_ENABLED=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-lifeguard-dev-jwt-secret-change-me}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-lifeguard-internal-dev-token-change-me}
      - DATABASE_URL=postgresql://lifeguard_user:lifeguard_pass@postgres:5432/lifeguard
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - postgres
      - redis
      - kafka
      - chroma

  ingestion_service:
    build:
      context: .
      dockerfile: ./microservices/ingestion_service/Dockerfile
    container_name: lifeguard_ingestion_service
    ports:
      - "8101:8101"
    environment:
      - SERVICE_NAME=ingestion_service
      - APP_PORT=8101
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka

  prediction_service:
    build:
      context: .
      dockerfile: ./microservices/prediction_service/Dockerfile
    container_name: lifeguard_prediction_service
    ports:
      - "8102:8102"
    environment:
      - SERVICE_NAME=prediction_service
      - APP_PORT=8102
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - BACKEND_URL=http://backend:8000
      - BACKEND_AI_URL=http://backend:8000/ai/query
      - BACKEND_PREDICTION_SAVE_URL=http://backend:8000/prediction/save
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-lifeguard-internal-dev-token-change-me}
      - DEFAULT_USER_ID=1
    depends_on:
      - kafka

  postgres:
    image: postgres:16-alpine
    container_name: lifeguard_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeguard}
      POSTGRES_USER: ${POSTGRES_USER:-lifeguard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeguard_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lifeguard_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lifeguard_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lifeguard_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  chroma:
    image: chromadb/chroma:0.5.4
    container_name: lifeguard_chroma
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data: